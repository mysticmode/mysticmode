<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mysticmode - Write</title>
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body class="write">
  <main>
    <form action="/write" method="post">
      <input type="text" name="title" placeholder="Post title">
      <div class="type">
        <input type="radio" id="post" name="type" value="archive" checked>
        <label for="post">Blog post</label>
        <input type="radio" id="poem" name="type" value="poem">
        <label for="poem">Poem</label>
      </div>
      <div class="date">
        <input type="text" name="year" placeholder="YYYY">
        <input type="text" name="month" placeholder="MM">
        <input type="text" name="day" placeholder="DD">
      </div>
      <textarea name="content" placeholder="Markdown content"></textarea>
      <input type="submit" value="Submit">
    </form>
  </main>
</body>
</html>
