{{define "layout"}}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mysticmode - All my public musing</title>
  <link rel="stylesheet" href="/assets/css/style.css">
</head>

<body>

  <nav>
    <a href="/">home</a>
    <a href="/archive" {{if .IsArchive}} class="active" {{end}}>archive</a>
    <a href="https://sr.ht/~mysticmode/">code</a>
    <a href="/poems" {{if .IsPoems}} class="active" {{end}}>poems</a>
  </nav>

  <main>
    <div>{{.Banner}}</div>
    <h3>{{.Title}}</h3>
    <span>{{.Date}}</span>
    <div>{{.Content}}</div>
  </main>

</body>

</html>
{{end}}
